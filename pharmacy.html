<!DOCTYPE html>
<html>
<head>
<title>Pharmacy Bill Module</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

form{
    background:white;
    width:350px;
    margin:20px auto;
    padding:20px;
    box-shadow:0px 0px 5px gray;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

table{
    margin:auto;
    background:white;
}
</style>

</head>

<body>

<h1>Pharmacy Bill Module</h1>

<form>
<input type="text" placeholder="Case ID"><br>
<input type="date"><br>
<input type="text" placeholder="Patient Name"><br>
<input type="text" placeholder="Doctor Name"><br>
<input type="number" placeholder="Discount"><br>
<input type="number" placeholder="Amount"><br>
<input type="number" placeholder="Paid Amount"><br>
<input type="number" placeholder="Balance Amount"><br>

<input type="submit" value="Submit">
</form>

<br><br>

<table border="1">
<tr>
<th>Bill No</th>
<th>Case Id</th>
<th>Date</th>
<th>Patient</th>
<th>Doctor</th>
<th>Amount</th>
</tr>

<tr>
<td>1</td>
<td>101</td>
<td>2026-04-01</td>
<td>Ravi</td>
<td>Dr. Kumar</td>
<td>500</td>
</tr>

</table>

</body>
</html>
